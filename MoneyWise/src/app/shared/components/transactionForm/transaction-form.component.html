<form [formGroup]="transactionForm">
  <ion-segment formControlName="type">
    <ion-segment-button value="expense">
      <ion-label>Gasto</ion-label>
    </ion-segment-button>
    <ion-segment-button value="income">
      <ion-label>Ingreso</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-item lines="full" class="form-item">
    <ion-label position="stacked">Título</ion-label>
    <app-input
      [control]="transactionForm.get('title')"
      placeholder="Ej: Almuerzo"
      class="custom-input"
    ></app-input>
    <div class="input-error">{{ titleError }}</div>
  </ion-item>

  <ion-item lines="full" class="form-item">
    <ion-label position="stacked">Monto</ion-label>
    <app-input
      [control]="transactionForm.get('amount')"
      type="number"
      placeholder="0"
      class="custom-input"
    >
    </app-input>
    <div class="input-error">{{ amountError }}</div>
  </ion-item>

  <ion-item lines="full" class="form-item">
    <ion-label position="stacked">Categoría</ion-label>
    <ion-select formControlName="category_id" placeholder="Seleccionar">
      @for (cat of categories; track cat.id) {
        <ion-select-option [value]="cat.id">{{ cat.name }}</ion-select-option>
      }
    </ion-select>
    <div class="input-error">{{ categoryError }}</div>
  </ion-item>

  <ion-item lines="full" class="form-item" id="open-date-modal">
    <ion-label position="stacked">Fecha</ion-label>
    <ion-text class="date-value">
      {{ transactionForm.get("date")?.value | dateForm }}
    </ion-text>
  </ion-item>

  <ion-modal trigger="open-date-modal" class="datetime-modal">
    <ng-template>
      <ion-datetime
        id="datetime"
        presentation="date"
        formControlName="date"
        [max]="today"
        showDefaultButtons="true"
        doneText="Confirmar"
        cancelText="Cancelar"
      >
      </ion-datetime>
    </ng-template>
  </ion-modal>

  <ion-item lines="full" class="form-item">
    <ion-label position="stacked">Descripción</ion-label>
    <ion-textarea
      formControlName="description"
      placeholder="Opcional..."
      rows="3"
    >
    </ion-textarea>
  </ion-item>

  <app-photo-selector
    [currentPhoto]="photoDataUrl"
    (onSelectedPhoto)="onPhotoSelected($event)"
    (onRemovePhoto)="onPhotoRemoved()"
  >
  </app-photo-selector>

  <div class="form-buttons">
    <ion-button expand="block" (click)="submit()" [disabled]="isLoading">
      <ion-icon name="checkmark-outline" slot="start"></ion-icon>
      {{ transaction ? "Actualizar" : "Guardar" }}
    </ion-button>
    <ion-button
      expand="block"
      fill="outline"
      color="medium"
      (click)="cancel()"
    >
      Cancelar
    </ion-button>
  </div>
</form>
